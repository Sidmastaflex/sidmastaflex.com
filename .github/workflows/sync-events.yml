name: Sync upcoming events from Linktree

on:
  schedule:
    - cron: "17 6,18 * * *"   # twice daily (UTC)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync Linktree events
        run: python scripts/sync_linktree.py
      - name: Commit and deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "linktree-sync[bot]"
            git config user.email "noreply@sidmastaflex.com"
            git add assets/events.json assets/events
            git commit -m "Sync upcoming events from Linktree"
            git push
            gh workflow run pages.yml --ref main
          else
            echo "No changes."
          fi
